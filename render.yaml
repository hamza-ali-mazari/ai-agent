services:
  - type: web
    name: ai-code-review-engine
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        fromSecret: azure_openai_api_version
      - key: BITBUCKET_USERNAME
        sync: false
      - key: BITBUCKET_TOKEN
        sync: false
      - key: BITBUCKET_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_DEEP_ANALYSIS
        fromSecret: github_deep_analysis